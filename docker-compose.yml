services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arkana
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d arkana']
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: arkana-backend-db-init
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: db-init
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arkana?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-lc', 'npm run db:push && npm run seed']
    restart: 'no'

  backend:
    image: arkana-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arkana?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: ['dist/server.js']
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: arkana-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  postgres-data:
